spring:
  application:
    name: weather-app
  datasource:
    url: jdbc:h2:file:./data/weather-cache
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

server:
  port: 8080

weather:
  cache:
    ttl: 5m
    coordinate-scale: 2
